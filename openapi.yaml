          in: query
          schema: { type: integer, default: 30, maximum: 100 }
      responses:
        "200":
          description: Paginated integrations
          headers:
            X-Total-Count: { schema: { type: integer } }
            X-Total-Pages: { schema: { type: integer } }
            X-Page-Number: { schema: { type: integer } }
            X-Next-Page: { schema: { type: integer } }
            X-Prev-Page: { schema: { type: integer } }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Integration" }
        "400":
          $ref: "#/components/responses/BadRequest"

    post:
      tags: [Integrations]
      operationId: createIntegration
      summary: Create or connect an email provider integration
      requestBody:
        required: true
