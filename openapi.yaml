openapi: 3.1.0
info:
  title: Nitrosend API
  version: 1.0.0
  description: |
    Multi-channel marketing automation API. Send email campaigns, build
    automation flows, manage contacts and segments, track events, and
    configure your brand — all via a single REST API.

    ## Authentication

    All `/v1/my/*` endpoints require authentication via **Bearer token**.
    Two token types are accepted (tried in order):

    1. **API Key** — `Authorization: Bearer nskey_live_...`
    2. **JWT** — `Authorization: Bearer <jwt>` (obtained from `POST /v1/login`)

    ## Pagination

    Paginated endpoints return these headers:
    - `X-Total-Count` — total records
    - `X-Total-Pages` — total pages
    - `X-Page-Number` — current page
    - `X-Next-Page` — next page (omitted on last page)
    - `X-Prev-Page` — previous page (omitted on first page)

    Use `page` and `limit` (or `per`) query params to control pagination.
    Maximum `limit` is 100, default is 30.

    ## Error Responses

    All errors return a consistent JSON shape:
    ```json
    {
      "code": 422,
      "message": "Description of error",
      "error": true,
      "validation_errors": { "field": ["error message"] }
    }
    ```
    The `validation_errors` key is only present on 422 responses.

  contact:
    name: Nitrosend
    url: https://nitrosend.com
  license:
    name: Proprietary
    url: https://nitrosend.com/terms

servers:
  - url: https://api.nitrosend.com
    description: Production
  - url: http://localhost:8000
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Login, logout, and registration
  - name: User
    description: Current user profile
  - name: Account
    description: Account settings and configuration
  - name: Contacts
    description: Contact management
  - name: Lists
    description: Contact lists
  - name: Segments
    description: Dynamic contact segments
  - name: Campaigns
    description: Email and SMS campaigns
  - name: Templates
    description: Email templates, preview, and component schema
  - name: Flows
    description: Automation flows and step schema
  - name: Events
    description: Contact event tracking
  - name: Domains
    description: Sending domain verification
  - name: Integrations
    description: BYO provider integration management
  - name: Brands
    description: Brand identity, theme, and per-brand configuration
  - name: Public
    description: Unauthenticated public endpoints

# =============================================================================
# PATHS
# =============================================================================
paths:
  # ---------------------------------------------------------------------------
  # Auth
  # ---------------------------------------------------------------------------
  /v1/signup:
    post:
      tags: [Auth]
      operationId: signup
      summary: Create a new account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user]
              properties:
                user:
                  type: object
                  required: [email, password]
                  properties:
                    first_name: { type: string }
                    last_name: { type: string }
                    email: { type: string, format: email }
                    mobile: { type: string }
                    password: { type: string, format: password, minLength: 6 }
                    password_confirmation: { type: string, format: password }
      responses:
        "201":
          description: Account created
          headers:
            Authorization:
              schema: { type: string }
              description: JWT token for the new session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Sign in and receive a JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user]
              properties:
                user:
                  type: object
                  required: [email, password]
                  properties:
                    email: { type: string, format: email }
                    password: { type: string, format: password }
      responses:
        "200":
          description: Signed in
          headers:
            Authorization:
              schema: { type: string }
              description: JWT token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/logout:
    delete:
      tags: [Auth]
      operationId: logout
      summary: Sign out and revoke JWT
      responses:
        "204":
          description: Signed out

  /v1/oauth/me:
    get:
      tags: [Auth]
      operationId: getOauthPopupContext
      summary: Get OAuth popup context
      description: |
        Returns the account-selection and subscription context used by the
        `/oauth/connect` popup. This endpoint accepts the normal Bearer JWT
        and, for popup resume flows, the authenticated browser session cookie
        established by Devise/OmniAuth.
      responses:
        "200":
          description: Popup context
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OAuthPopupContext" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/oauth/subscribe:
    post:
      tags: [Auth]
      operationId: subscribeOauthPopupAccount
      summary: Subscribe the selected OAuth popup account
      description: |
        Finalizes plan selection for the `/oauth/connect` popup before the
        browser returns to the Doorkeeper consent screen. This endpoint accepts
        the normal Bearer JWT and, for popup resume flows, the authenticated
        browser session cookie established by Devise/OmniAuth.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OAuthPopupSubscribeRequest" }
      responses:
        "200":
          description: Popup can continue to consent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OAuthPopupSubscribeResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: Account or plan selection failed
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error: { type: string }

  /v1/oauth/launch:
    post:
      tags: [Auth]
      operationId: createOauthLaunch
      summary: Create a CSRF-safe OAuth provider launch URL
      security: []
      description: |
        Mints a short-lived launch URL for Google or GitHub sign-in. The
        frontend follows the returned API-origin launch page, which renders the
        real POST form to `/auth/:provider` with a valid Rails authenticity
        token. This preserves OmniAuth's POST-only request phase and CSRF
        protection for both the app popup flow and the `/oauth/connect` agent
        popup flow.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OAuthLaunchRequest" }
      responses:
        "200":
          description: Launch URL created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OAuthLaunchResponse" }
        "400":
          description: Invalid provider or resume URL
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error: { type: string }

  # ---------------------------------------------------------------------------
  # User
  # ---------------------------------------------------------------------------
  /v1/my/user:
    get:
      tags: [User]
      operationId: getUser
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          $ref: "#/components/responses/Unauthorized"

    patch:
      tags: [User]
      operationId: updateUser
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name: { type: string }
                email: { type: string, format: email }
                mobile: { type: string }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "422":
          $ref: "#/components/responses/ValidationError"

  # ---------------------------------------------------------------------------
  # Account
  # ---------------------------------------------------------------------------
  /v1/my/account:
    get:
      tags: [Account]
      operationId: getAccount
      summary: Get account details
      responses:
        "200":
          description: Account with brands and billing
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Account" }

    patch:
      tags: [Account]
      operationId: updateAccount
      summary: Update account settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                avatar: { type: string, description: Signed blob ID }
                banner: { type: string, description: Signed blob ID }
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Account" }
        "422":
          $ref: "#/components/responses/ValidationError"

  # ---------------------------------------------------------------------------
  # Contacts
  # ---------------------------------------------------------------------------
  /v1/my/contacts:
    get:
      tags: [Contacts]
      operationId: listContacts
      summary: List contacts (paginated)
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
        - name: search
          in: query
          schema: { type: string }
          description: Full-text search across name, email, phone
        - name: list_id
          in: query
          schema: { type: integer }
          description: Filter contacts belonging to this list
      responses:
        "200":
          description: Paginated contacts
          headers:
            X-Total-Count: { schema: { type: integer } }
            X-Total-Pages: { schema: { type: integer } }
            X-Page-Number: { schema: { type: integer } }
            X-Next-Page: { schema: { type: integer } }
            X-Prev-Page: { schema: { type: integer } }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Contact" }

    post:
      tags: [Contacts]
      operationId: createContact
      summary: Create a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name: { type: string }
                email: { type: string, format: email, description: "Creates/updates email channel with opt_in" }
                phone: { type: string, description: "E.164 format. Creates/updates phone channel with opt_in" }
                source: { type: string }
                country_code: { type: string }
                list_ids:
                  type: array
                  items: { type: integer }
                data:
                  type: object
                  additionalProperties: true
                  description: Custom key-value data
                channels_attributes:
                  type: array
                  items:
                    type: object
                    properties:
                      kind: { type: string, enum: [email, phone] }
                      value: { type: string }
                      subscribed: { type: boolean }
      responses:
        "201":
          description: Contact created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Contact" }
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/my/contacts/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Contacts]
      operationId: getContact
      summary: Get a contact
      responses:
        "200":
          description: Contact with channels
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Contact" }
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Contacts]
      operationId: updateContact
      summary: Update a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                source: { type: string }
                country_code: { type: string }
                list_ids:
                  type: array
                  items: { type: integer }
                data:
                  type: object
                  additionalProperties: true
                channels_attributes:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: integer }
                      kind: { type: string, enum: [email, phone] }
                      value: { type: string }
                      subscribed: { type: boolean }
                      _destroy: { type: boolean }
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Contact" }
        "422":
          $ref: "#/components/responses/ValidationError"

    delete:
      tags: [Contacts]
      operationId: deleteContact
      summary: Delete a contact
      responses:
        "200":
          description: Deleted contact
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Contact" }

  /v1/my/contacts/{id}/enrich:
    post:
      tags: [Contacts]
      operationId: enrichContact
      summary: Re-enrich a contact via email verification + Apollo
      description: |
        Queues the contact for email verification and Apollo enrichment.
        Consumes 2 validation allowance units. Requires the contact to have
        an email channel.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Enrichment queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Contact" }
        "400":
          description: Contact has no email or validation allowance exhausted
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Lists
  # ---------------------------------------------------------------------------
  /v1/my/lists:
    get:
      tags: [Lists]
      operationId: listLists
      summary: List contact lists (paginated)
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Paginated contact lists
          headers:
            X-Total-Count: { schema: { type: integer } }
            X-Total-Pages: { schema: { type: integer } }
            X-Page-Number: { schema: { type: integer } }
            X-Next-Page: { schema: { type: integer } }
            X-Prev-Page: { schema: { type: integer } }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ContactList" }

    post:
      tags: [Lists]
      operationId: createList
      summary: Create a contact list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                segment_id: { type: integer, nullable: true }
                contact_ids:
                  type: array
                  items: { type: integer }
      responses:
        "201":
          description: List created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContactList" }
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/my/lists/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Lists]
      operationId: getList
      summary: Get a contact list
      responses:
        "200":
          description: Contact list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContactList" }
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Lists]
      operationId: updateList
      summary: Update a contact list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                segment_id: { type: integer, nullable: true }
                contact_ids:
                  type: array
                  items: { type: integer }
      responses:
        "200":
          description: Updated list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContactList" }
        "422":
          $ref: "#/components/responses/ValidationError"

    delete:
      tags: [Lists]
      operationId: deleteList
      summary: Delete a contact list
      responses:
        "200":
          description: Deleted list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContactList" }

  # ---------------------------------------------------------------------------
  # Segments
  # ---------------------------------------------------------------------------
  /v1/my/segments:
    get:
      tags: [Segments]
      operationId: listSegments
      summary: List all segments
      responses:
        "200":
          description: Segments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Segment" }

    post:
      tags: [Segments]
      operationId: createSegment
      summary: Create a segment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                filters:
                  $ref: "#/components/schemas/SegmentFilters"
      responses:
        "201":
          description: Segment created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Segment" }
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/my/segments/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Segments]
      operationId: getSegment
      summary: Get a segment
      responses:
        "200":
          description: Segment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Segment" }
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Segments]
      operationId: updateSegment
      summary: Update a segment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                filters:
                  $ref: "#/components/schemas/SegmentFilters"
      responses:
        "200":
          description: Updated segment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Segment" }
        "422":
          $ref: "#/components/responses/ValidationError"

    delete:
      tags: [Segments]
      operationId: deleteSegment
      summary: Delete a segment
      responses:
        "200":
          description: Deleted segment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Segment" }

  /v1/my/segments/count:
    post:
      tags: [Segments]
      operationId: countSegment
      summary: Count contacts matching filters
      description: |
        Preview how many contacts match a set of segment filters
        without creating or saving a segment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  $ref: "#/components/schemas/SegmentFilters"
      responses:
        "200":
          description: Contact count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }

  # ---------------------------------------------------------------------------
  # Campaigns
  # ---------------------------------------------------------------------------
  /v1/my/campaigns:
    get:
      tags: [Campaigns]
      operationId: listCampaigns
      summary: List campaigns (paginated)
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Paginated campaigns
          headers:
            X-Total-Count: { schema: { type: integer } }
            X-Total-Pages: { schema: { type: integer } }
            X-Page-Number: { schema: { type: integer } }
            X-Next-Page: { schema: { type: integer } }
            X-Prev-Page: { schema: { type: integer } }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Campaign" }

    post:
      tags: [Campaigns]
      operationId: createCampaign
      summary: Create a campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                channel: { type: string, enum: [email, sms], default: email }
      responses:
        "201":
          description: Campaign created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Campaign" }
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/my/campaigns/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Campaigns]
      operationId: getCampaign
      summary: Get a campaign
      responses:
        "200":
          description: Campaign with trigger, template, and templates
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Campaign" }
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Campaigns]
      operationId: updateCampaign
      summary: Update a campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                status: { type: string }
                channel: { type: string, enum: [email, sms] }
                scheduled_at: { type: string, format: date-time, nullable: true }
                trigger_attributes:
                  type: object
                  properties:
                    event: { type: string }
                    contact_list_id: { type: integer, nullable: true, deprecated: true }
                    contact_list_ids:
                      type: array
                      items: { type: integer }
                    segment_id: { type: integer, nullable: true }
                    data: { type: object, additionalProperties: true }
                template_attributes:
                  type: object
                  properties:
                    subject: { type: string }
                    body: { type: string }
                    preheader: { type: string }
                    from_name: { type: string }
                    from_email: { type: string, format: email }
                    reply_to: { type: string, format: email }
                    design:
                      $ref: "#/components/schemas/EmailDesign"
      responses:
        "200":
          description: Updated campaign
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Campaign" }
        "422":
          $ref: "#/components/responses/ValidationError"

    delete:
      tags: [Campaigns]
      operationId: deleteCampaign
      summary: Delete a campaign
      responses:
        "200":
          description: Deleted campaign
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Campaign" }

  /v1/my/campaigns/{id}/send:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      tags: [Campaigns]
      operationId: sendCampaign
      summary: Send a campaign
      description: |
        Transitions the campaign and its flow to live, then delivers.
        Optionally update trigger and template attributes in the same request.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                trigger_attributes:
                  type: object
                  properties:
                    event: { type: string }
                    contact_list_id: { type: integer, nullable: true, deprecated: true }
                    contact_list_ids:
                      type: array
                      items: { type: integer }
                    segment_id: { type: integer, nullable: true }
                    data: { type: object, additionalProperties: true }
                template_attributes:
                  type: object
                  properties:
                    subject: { type: string }
                    body: { type: string }
                    preheader: { type: string }
                    from_name: { type: string }
                    from_email: { type: string, format: email }
                    reply_to: { type: string, format: email }
                    design:
                      $ref: "#/components/schemas/EmailDesign"
      responses:
        "200":
          description: Campaign sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Campaign" }
        "422":
          $ref: "#/components/responses/ValidationError"

  # ---------------------------------------------------------------------------
  # Templates
  # ---------------------------------------------------------------------------
  /v1/my/templates:
    get:
      tags: [Templates]
      operationId: listTemplates
      summary: List all templates
      description: Returns a summary view with section counts (not full design).
      responses:
        "200":
          description: Template summaries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TemplateSummary" }

    post:
      tags: [Templates]
      operationId: createTemplate
      summary: Create a standalone template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                subject: { type: string }
                preheader: { type: string }
                design:
                  $ref: "#/components/schemas/EmailDesign"
      responses:
        "201":
          description: Created template
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Template" }
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/my/templates/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Templates]
      operationId: getTemplate
      summary: Get a template with full design
      responses:
        "200":
          description: Full template including design
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Template" }
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Templates]
      operationId: updateTemplate
      summary: Update a template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                subject: { type: string }
                body: { type: string }
                preheader: { type: string }
                from_name: { type: string }
                from_email: { type: string, format: email }
                reply_to: { type: string, format: email }
                design:
                  $ref: "#/components/schemas/EmailDesign"
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Template" }
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/my/templates/{id}/send_test:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      tags: [Templates]
      operationId: sendTestEmail
      summary: Send a test email
      description: |
        Send a test email for the given template. Provide `email` for an
        explicit recipient, `contact_id` to use a contact's email (with
        merge-tag personalization), or omit both to send to the account owner.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                contact_id: { type: integer }
      responses:
        "200":
          description: Test email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent: { type: integer }
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        email: { type: string }
                        success: { type: boolean }
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/my/templates/preview:
    post:
      tags: [Templates]
      operationId: previewEmail
      summary: Render an email design to HTML
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [document]
              properties:
                document:
                  $ref: "#/components/schemas/EmailDesign"
      responses:
        "200":
          description: Rendered HTML
          content:
            application/json:
              schema:
                type: object
                properties:
                  html: { type: string }
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/my/templates/spec:
    get:
      tags: [Templates]
      operationId: getEmailComponentSpec
      summary: Get the email component schema
      description: |
        Returns the full schema for email design sections including all
        component types, their props, required fields, and defaults.
        Sourced from `config/email_components.yml`.
      responses:
        "200":
          description: Email component schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailComponentSpec"

  /v1/my/templates/starters:
    get:
      tags: [Templates]
      operationId: listEmailStarters
      summary: List email starter designs
      description: |
        Returns config-based starter email designs with the current brand's
        theme merged and an HTML preview rendered for each starter.
      responses:
        "200":
          description: Starter designs with brand theme and preview HTML
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/EmailStarter" }

  /v1/my/templates/generate:
    post:
      tags: [Templates]
      operationId: generateEmailTemplate
      summary: AI-generate an email template
      description: |
        Generate a complete email design from a text goal using AI. Returns a
        sections-based design, subject line, preheader, and inferred category.
        Supports refine mode by passing existing sections[] for modification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [goal]
              properties:
                goal:
                  type: string
                  description: What the email should accomplish
                  example: "Welcome new subscribers and introduce the brand"
                category:
                  type: string
                  description: Optional category hint (welcome, newsletter, promotion, etc.)
                tone:
                  type: string
                  description: Optional tone override (formal, casual, etc.)
                sections:
                  type: array
                  description: Current sections for refine mode — LLM adjusts existing content
                  items:
                    type: object
      responses:
        "200":
          description: Generated email design
          content:
            application/json:
              schema:
                type: object
                properties:
                  design:
                    type: object
                    description: "{ version, theme, sections[] } — ready for GrapesJS"
                  subject:
                    type: string
                  preheader:
                    type: string
                  category:
                    type: string
                    description: Inferred or provided category
                  prompt_version:
                    type: string
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                ai_limit_reached:
                  value: { error: true, code: "ai_limit_reached", message: "Generation limit reached." }
                brand_incomplete:
                  value: { error: true, code: "brand_incomplete", message: "Complete brand setup first." }
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                generation_failed:
                  value: { error: true, code: "generation_failed", message: "Generation failed. Try again." }

  # ---------------------------------------------------------------------------
  # Flows
  # ---------------------------------------------------------------------------
  /v1/my/flows:
    get:
      tags: [Flows]
      operationId: listFlows
      summary: List automation flows (paginated)
      description: Returns standalone flows only (excludes campaign-attached flows).
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Paginated flows
          headers:
            X-Total-Count: { schema: { type: integer } }
            X-Total-Pages: { schema: { type: integer } }
            X-Page-Number: { schema: { type: integer } }
            X-Next-Page: { schema: { type: integer } }
            X-Prev-Page: { schema: { type: integer } }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Flow" }

    post:
      tags: [Flows]
      operationId: createFlow
      summary: Create a flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                status: { type: string, enum: [draft, active, paused, archived] }
                trigger:
                  $ref: "#/components/schemas/FlowTriggerInput"
                steps:
                  type: array
                  items:
                    $ref: "#/components/schemas/FlowStepInput"
      responses:
        "201":
          description: Flow created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Flow" }
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/my/flows/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Flows]
      operationId: getFlow
      summary: Get a flow
      responses:
        "200":
          description: Flow with full graph
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Flow" }
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Flows]
      operationId: updateFlow
      summary: Update a flow
      description: |
        Supports optimistic concurrency — pass `updated_at` to reject
        the update if the flow was modified externally.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                status: { type: string, enum: [draft, active, paused, archived] }
                updated_at:
                  type: string
                  format: date-time
                  description: Optimistic concurrency check
                trigger:
                  $ref: "#/components/schemas/FlowTriggerInput"
                steps:
                  type: array
                  items:
                    $ref: "#/components/schemas/FlowStepInput"
      responses:
        "200":
          description: Updated flow
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Flow" }
        "409":
          description: Conflict — flow was modified externally
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          $ref: "#/components/responses/ValidationError"

    delete:
      tags: [Flows]
      operationId: deleteFlow
      summary: Delete a flow
      responses:
        "200":
          description: Deleted flow
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Flow" }

  /v1/my/flows/spec:
    get:
      tags: [Flows]
      operationId: getFlowSpec
      summary: Get the flow step type schema
      description: |
        Returns the schema for flow step types, trigger events, and
        segment filters. Sourced from `config/flows.yml`.
      responses:
        "200":
          description: Flow specification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowSpec"

  # ---------------------------------------------------------------------------
  # Events
  # ---------------------------------------------------------------------------
  /v1/my/events:
    get:
      tags: [Events]
      operationId: listEvents
      summary: List events (paginated)
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
        - name: event
          in: query
          schema: { type: string }
          description: Filter by event type
        - name: contact_id
          in: query
          schema: { type: integer }
        - name: created_after
          in: query
          schema: { type: string, format: date-time }
        - name: created_before
          in: query
          schema: { type: string, format: date-time }
        - name: resource_uid
          in: query
          schema: { type: string }
        - name: resource_name
          in: query
          schema: { type: string }
        - name: test
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Paginated events
          headers:
            X-Total-Count: { schema: { type: integer } }
            X-Total-Pages: { schema: { type: integer } }
            X-Page-Number: { schema: { type: integer } }
            X-Next-Page: { schema: { type: integer } }
            X-Prev-Page: { schema: { type: integer } }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Event" }

    post:
      tags: [Events]
      operationId: createEvent
      summary: Track a contact event
      description: |
        Requires an idempotency key via the `Idempotency-Key` header or
        `idempotency_key` body param. Duplicate events (same account +
        event type + idempotency key) return the existing event.
      parameters:
        - name: Idempotency-Key
          in: header
          schema: { type: string, maxLength: 128 }
          description: Idempotency key (alternative to body param)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event]
              properties:
                event:
                  type: string
                  pattern: "^[a-z][a-z0-9_]{0,63}$"
                  description: Event type name (lowercase, underscores)
                contact_id: { type: integer }
                contact_email:
                  type: string
                  format: email
                  description: Alternative to contact_id — resolves contact by email
                idempotency_key:
                  type: string
                  maxLength: 128
                  description: Idempotency key (alternative to header)
                amount: { type: number, format: double }
                resource_uid: { type: string }
                resource_name: { type: string }
                resource_url: { type: string, format: uri }
                test: { type: boolean, default: false }
                data:
                  type: object
                  additionalProperties: true
                  description: Custom event payload (max 32KB)
                utm_source: { type: string }
                utm_medium: { type: string }
                utm_term: { type: string }
                utm_content: { type: string }
                utm_campaign: { type: string }
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Event" }
        "200":
          description: Duplicate event (idempotent — returns existing)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Event" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/my/events/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Events]
      operationId: getEvent
      summary: Get an event
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Event" }
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Events]
      operationId: deleteEvent
      summary: Delete an event
      responses:
        "200":
          description: Deleted event
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Event" }

  # ---------------------------------------------------------------------------
  # Domains
  # ---------------------------------------------------------------------------
  /v1/my/domains:
    get:
      tags: [Domains]
      operationId: listDomains
      summary: List sending domains (paginated)
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: per
          in: query
          schema: { type: integer, default: 30, maximum: 100 }
      responses:
        "200":
          description: Paginated domains
          headers:
            X-Total-Count: { schema: { type: integer } }
            X-Total-Pages: { schema: { type: integer } }
            X-Page-Number: { schema: { type: integer } }
            X-Next-Page: { schema: { type: integer } }
            X-Prev-Page: { schema: { type: integer } }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Domain" }

    post:
      tags: [Domains]
      operationId: createDomain
      summary: Add a sending domain
      description: |
        Initiates domain verification. Returns DNS records that must be
        added at your domain registrar before calling `POST /verify`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain]
              properties:
                domain:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string, description: "e.g. send.example.com" }
      responses:
        "201":
          description: Domain registered with DNS records to configure
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Domain" }
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/my/domains/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Domains]
      operationId: getDomain
      summary: Get a domain with DNS records and status
      responses:
        "200":
          description: Domain
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Domain" }
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Domains]
      operationId: deleteDomain
      summary: Remove a sending domain
      responses:
        "204":
          description: Domain deleted

  /v1/my/domains/{id}/verify:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    post:
      tags: [Domains]
      operationId: verifyDomain
      summary: Verify domain DNS records
      description: |
        Checks if the required DNS records have propagated. If verified,
        completes the `domain_verified` onboarding step and enables sending.
      responses:
        "200":
          description: Domain verification status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Domain" }

