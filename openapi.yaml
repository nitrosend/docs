        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/my/integrations/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Integrations]
      operationId: getIntegration
      summary: Get an integration
