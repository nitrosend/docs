        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Brands
  # ---------------------------------------------------------------------------
  /v1/my/brands:
    get:
      tags: [Brands]
      operationId: listBrands
      summary: List brands
      responses:
        "200":
          description: All brands for the account
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Brand" }

    post:
      tags: [Brands]
      operationId: createBrand
      summary: Create a brand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                brand_color: { type: string, pattern: "^#[0-9a-fA-F]{6}$" }
                text_color: { type: string, pattern: "^#[0-9a-fA-F]{6}$" }
                bg_color: { type: string, pattern: "^#[0-9a-fA-F]{6}$" }
                font_heading: { type: string }
                font_body: { type: string }
                style_notes: { type: string }
                tone: { type: string }
                company_description: { type: string }
                industry: { type: string }
                physical_address: { type: string }
                company_name: { type: string }
                logo: { type: string, description: Signed blob ID or URL }
                email_from_name: { type: string }
                email_from_email: { type: string, format: email }
                email_reply_to: { type: string, format: email }
                test_email_recipients:
                  type: array
                  items: { type: string, format: email }
                  maxItems: 5
                example_copy:
                  type: array
                  items: { type: string }
                links:
                  type: array
                  items:
                    type: object
                    properties:
                      url: { type: string, format: uri }
                      icon: { type: string }
                      title: { type: string }
                default_header: { type: object, additionalProperties: true }
                default_footer: { type: object, additionalProperties: true }
                default_theme: { type: object, additionalProperties: true }
      responses:
        "201":
          description: Brand created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Brand" }
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/my/brands/{sid}:
    parameters:
      - $ref: "#/components/parameters/BrandSid"
    get:
      tags: [Brands]
      operationId: getBrand
      summary: Get a brand
      responses:
        "200":
          description: Brand
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Brand" }
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Brands]
      operationId: updateBrand
      summary: Update a brand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                brand_color: { type: string, pattern: "^#[0-9a-fA-F]{6}$" }
                text_color: { type: string, pattern: "^#[0-9a-fA-F]{6}$" }
                bg_color: { type: string, pattern: "^#[0-9a-fA-F]{6}$" }
                font_heading: { type: string }
                font_body: { type: string }
                style_notes: { type: string }
                tone: { type: string }
                company_description: { type: string }
                industry: { type: string }
                physical_address: { type: string }
                company_name: { type: string }
                logo: { type: string, description: Signed blob ID or URL }
                email_from_name: { type: string }
                email_from_email: { type: string, format: email }
                email_reply_to: { type: string, format: email }
                test_email_recipients:
                  type: array
                  items: { type: string, format: email }
                  maxItems: 5
                example_copy:
                  type: array
                  items: { type: string }
                links:
                  type: array
                  items:
                    type: object
                    properties:
                      url: { type: string, format: uri }
                      icon: { type: string }
                      title: { type: string }
                default_header: { type: object, additionalProperties: true }
                default_footer: { type: object, additionalProperties: true }
                default_theme: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Updated brand
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Brand" }
        "422":
          $ref: "#/components/responses/ValidationError"

    delete:
      tags: [Brands]
      operationId: deleteBrand
      summary: Delete a brand
      responses:
        "200":
          description: Deleted brand
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Brand" }

  /v1/my/brands/{sid}/scrape:
    parameters:
      - $ref: "#/components/parameters/BrandSid"
    post:
      tags: [Brands]
      operationId: scrapeBrand
      summary: Auto-detect brand from website
      description: |
        Enqueues a background job that scrapes the URL for brand colors,
        fonts, logo, and tone. Returns 202 immediately. Poll
        `GET /v1/my/brands/{sid}` for results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri }
      responses:
        "202":
          description: Scrape job enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: scraping }
                  url: { type: string, format: uri }
        "422":
          description: Invalid URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }

  /v1/my/brands/{sid}/onboarding:
    parameters:
      - $ref: "#/components/parameters/BrandSid"
    get:
      tags: [Brands]
      operationId: getBrandOnboarding
      summary: Get brand onboarding state
      responses:
        "200":
          description: Onboarding state for the brand
          content:
            application/json:
              schema:
                type: object
                properties:
                  steps:
                    type: object
                    description: "Current state of each onboarding step"
                  progress:
                    type: object
                    properties:
                      completed: { type: integer }
                      total: { type: integer }
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/my/brands/{sid}/onboarding/steps:
    parameters:
      - $ref: "#/components/parameters/BrandSid"
    post:
      tags: [Brands]
      operationId: completeBrandOnboardingStep
      summary: Complete a brand onboarding step
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [step]
              properties:
                step:
                  type: string
                  enum: [brand_setup, domain_verified, first_contact, first_send]
      responses:
        "200":
          description: Updated onboarding state
          content:
            application/json:
              schema:
                type: object
                properties:
                  steps:
                    type: object
                  progress:
                    type: object
                    properties:
                      completed: { type: integer }
                      total: { type: integer }
        "422":
          $ref: "#/components/responses/ValidationError"

  # ---------------------------------------------------------------------------
  # Messages
  # ---------------------------------------------------------------------------
  /v1/my/messages:
    post:
      tags: [Messages]
      operationId: createMessage
      summary: Send a transactional message
      description: |
        Send a transactional email or SMS to a single recipient immediately.
        No campaign, no audience, no approval required.
        Use for receipts, password resets, OTPs, order confirmations, and system notifications.
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
          description: Prevents duplicate sends on retry. Same key returns the original message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel, to]
              properties:
                channel:
                  type: string
                  enum: [email, sms]
                to:
                  type: string
                  description: Recipient email address or E.164 phone number
                subject:
                  type: string
                  description: Email subject line (required for email channel)
                body:
                  type: string
                  description: Message body. Required for SMS. Optional plain text for email.
                template_id:
                  type: integer
                  description: Load email design from an existing template (email only)
                data:
                  type: object
                  description: Merge variables
                  additionalProperties: true
                idempotency_key:
                  type: string
                  description: Idempotency key (alternative to header)
      responses:
        "201":
          description: Message created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }
        "422":
          $ref: "#/components/responses/ValidationError"

    get:
      tags: [Messages]
      operationId: listMessages
      summary: List messages
      description: |
        Returns transactional messages by default. Use source_type=all to include
        flow/campaign-generated messages, or source_type=flow for flow-only.
      parameters:
        - name: source_type
          in: query
          schema: { type: string, enum: [all, flow] }
          description: "Filter by source. Omit for transactional only, 'all' for everything, 'flow' for flow/campaign messages."
        - name: channel
          in: query
          schema: { type: string, enum: [email, sms] }
        - name: status
          in: query
          schema: { type: string, enum: [queued, sent, failed] }
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Paginated list of messages
          headers:
            X-Total-Count: { schema: { type: integer } }
            X-Total-Pages: { schema: { type: integer } }
            X-Page-Number: { schema: { type: integer } }
            X-Next-Page: { schema: { type: integer } }
            X-Prev-Page: { schema: { type: integer } }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Message" }

  /v1/my/messages/{id}:
    get:
      tags: [Messages]
      operationId: getMessage
      summary: Get a transactional message
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Message
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Public
  # ---------------------------------------------------------------------------
  /v1/app:
    get:
      tags: [Public]
      operationId: getPlans
      summary: Get available plans
      security: []
      responses:
        "200":
          description: Active plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  plans:
                    type: array
                    items: { $ref: "#/components/schemas/Plan" }

# =============================================================================
# COMPONENTS
# =============================================================================
components:
  # ---------------------------------------------------------------------------
  # Security Schemes
  # ---------------------------------------------------------------------------
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        API key (`nskey_live_...`) or JWT token. API key is checked first;
        if not found, falls back to Devise JWT authentication.

        For multi-brand accounts, include the `X-Brand-SID` header to scope
        requests to a specific brand. If omitted, the account's default
        brand is used.

  # ---------------------------------------------------------------------------
  # Parameters
  # ---------------------------------------------------------------------------
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema: { type: integer }
    BrandSid:
      name: sid
      in: path
      required: true
      schema: { type: string }
      description: Brand secure identifier
    PageParam:
      name: page
      in: query
      schema: { type: integer, default: 1 }
    LimitParam:
      name: limit
      in: query
      schema: { type: integer, default: 25, maximum: 100 }
    XBrandSID:
      name: X-Brand-SID
      in: header
      required: false
      schema: { type: string }
      description: |
        Optional brand context header. Pass the brand's `sid` to scope the
        request to a specific brand. If omitted, the account's default brand
        is used. Required for accounts with multiple brands.

  # ---------------------------------------------------------------------------
  # Responses
  # ---------------------------------------------------------------------------
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

    Unauthorized:
      description: Not authenticated
      headers:
        WWW-Authenticate:
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

    Forbidden:
      description: Not authorized
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Error"
              - type: object
                properties:
                  validation_errors:
                    type: object
                    additionalProperties:
                      type: array
                      items: { type: string }

    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  # ---------------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------------
  schemas:
    # -- Error --
    Error:
      type: object
      required: [code, message, error]
      properties:
        code: { type: integer }
        message: { type: string }
        error: { type: boolean, const: true }

    # -- User (default AMS) --
    User:
      type: object
      properties:
        id: { type: integer }
        first_name: { type: string, nullable: true }
        last_name: { type: string, nullable: true }
        email: { type: string, format: email }
        mobile: { type: string, nullable: true }
        country_code: { type: string, nullable: true }
        admin: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # -- Account (AccountSerializer) --
    Account:
      type: object
      properties:
        id: { type: integer }
        name: { type: string, nullable: true }
        avatar: { type: string, nullable: true, description: Signed blob ID }
        banner: { type: string, nullable: true, description: Signed blob ID }
        account_tier: { type: string, enum: [free, paid, trusted] }
        billing:
          type: object
          properties:
            plan_name: { type: string }
            wallet_balance_cents: { type: integer }
            auto_topup: { type: boolean }
            resources:
              type: object
              properties:
                email: { type: object, properties: { used: { type: integer }, allowance: { type: integer }, remaining: { type: integer }, overage_rate: { type: number } } }
                sms: { type: object, properties: { used: { type: integer }, allowance: { type: integer }, remaining: { type: integer }, overage_rate: { type: number } } }
                ai: { type: object, properties: { used: { type: integer }, allowance: { type: integer }, remaining: { type: integer }, overage_rate: { type: number } } }
            lifetime:
              type: object
              properties:
                email_sent: { type: integer }
                sms_sent: { type: integer }
                ai_used: { type: integer }
        brands:
          type: array
          items: { $ref: "#/components/schemas/Brand" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    OAuthPopupAccount:
      type: object
      required: [id, name, needs_subscribe]
      properties:
        id: { type: integer }
        name: { type: string }
        needs_subscribe: { type: boolean }

    OAuthPopupPlan:
      type: object
      required: [id, name, slug, base_price_cents]
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        base_price_cents: { type: integer }
        interval: { type: string, nullable: true }

    OAuthPopupContext:
      type: object
      required: [accounts, plans]
      properties:
        accounts:
          type: array
          items: { $ref: "#/components/schemas/OAuthPopupAccount" }
        plans:
          type: array
          items: { $ref: "#/components/schemas/OAuthPopupPlan" }
        stripe_publishable_key: { type: string, nullable: true }

    OAuthPopupSubscribeRequest:
      type: object
      required: [plan_id]
      properties:
        plan_id: { type: integer }
        account_id: { type: integer, nullable: true }
        stripe_token: { type: string, nullable: true }

    OAuthPopupSubscribeResponse:
      type: object
      required: [next_step]
      properties:
        next_step:
          type: string
          enum: [consent]

    OAuthLaunchRequest:
      type: object
      required: [provider]
      properties:
        provider:
          type: string
          enum: [google_oauth2, github]
        auth_intent:
          type: string
          enum: [app, agent]
          default: app
        auth_step:
          type: string
          enum: [login, signup]
          default: login
        resume_url:
          type: string
          format: uri
          nullable: true
          description: Required when `auth_intent=agent`; must point to the frontend `/oauth/connect` route.

    OAuthLaunchResponse:
      type: object
      required: [launch_url]
      properties:
        launch_url:
          type: string
          format: uri

    # -- Brand (BrandSerializer) --
    Brand:
      type: object
      properties:
        id: { type: integer }
        sid: { type: string, description: "Public secure identifier (non-sequential)", readOnly: true }
        account_id: { type: integer }
        brand_color: { type: string, nullable: true }
        text_color: { type: string, nullable: true }
        bg_color: { type: string, nullable: true }
        font_heading: { type: string, nullable: true }
        font_body: { type: string, nullable: true }
        style_notes: { type: string, nullable: true }
        tone: { type: string, nullable: true }
        company_description: { type: string, nullable: true }
        industry: { type: string, nullable: true }
        example_copy:
          type: array
          items: { type: string }
          nullable: true
        default_header: { type: object, nullable: true }
        default_footer: { type: object, nullable: true }
        default_theme: { type: object, nullable: true }
        physical_address: { type: string, nullable: true }
        company_name: { type: string, nullable: true }
        source_url: { type: string, nullable: true }
        last_scraped_at: { type: string, format: date-time, nullable: true }
        links:
          type: array
          items:
            type: object
            properties:
              url: { type: string }
              icon: { type: string }
              title: { type: string }
          nullable: true
        logo: { type: string, nullable: true, description: Logo URL }
        complete: { type: boolean, description: "True when brand_color and company_name are set" }
        email_from_name: { type: string, nullable: true }
        email_from_email: { type: string, nullable: true }
        email_reply_to: { type: string, nullable: true }
        test_email_recipients:
          type: array
          items: { type: string, format: email }
        onboarding_state:
          type: object
          additionalProperties: true
          description: "JSONB — keys are step names, values are completion metadata"
        onboarding:
          type: object
          properties:
            steps:
              type: object
              description: "Current state of each onboarding step"
            progress:
              type: object
              properties:
                completed: { type: integer }
                total: { type: integer }
        domain_verified: { type: boolean }
        can_send: { type: boolean }
        using_sandbox: { type: boolean }
        sandbox_email: { type: string, nullable: true }
        sandbox_monthly_cap: { type: integer }
        sandbox_sends_remaining: { type: integer }
        capabilities:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # -- Contact (ContactSerializer) --
    Contact:
      type: object
      properties:
        id: { type: integer }
        brand_id: { type: integer, nullable: true }
        uuid: { type: string, format: uuid }
        first_name: { type: string, nullable: true }
        last_name: { type: string, nullable: true }
        source: { type: string, nullable: true }
        country_code: { type: string, nullable: true }
        data: { type: object, additionalProperties: true }
        subscribed_phone: { type: boolean }
        subscribed_email: { type: boolean }
        verification_status: { type: string, enum: [verified, suppressed, unverified] }
        enrichment_status: { type: string, enum: [enriched, not_enriched] }
        list_ids:
          type: array
          items: { type: integer }
        last_interacted_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        channels:
          type: array
          items: { $ref: "#/components/schemas/ContactChannel" }

    # -- ContactChannel (default AMS) --
    ContactChannel:
      type: object
      properties:
        id: { type: integer }
        contact_id: { type: integer }
        kind: { type: string, enum: [email, phone] }
        value: { type: string }
        subscribed: { type: boolean }
        verified: { type: boolean }
        opt_in_at: { type: string, format: date-time, nullable: true }
        opt_out_at: { type: string, format: date-time, nullable: true }
        sent_count: { type: integer }
        fail_count: { type: integer }
        data: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # -- ContactList (default AMS) --
    ContactList:
      type: object
      properties:
        id: { type: integer }
        account_id: { type: integer }
        brand_id: { type: integer, nullable: true }
        name: { type: string }
        contacts_count: { type: integer }
        segment_id: { type: integer, nullable: true }
        stale: { type: boolean }
        last_populated_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # -- Segment (SegmentSerializer) --
    Segment:
      type: object
      properties:
        id: { type: integer }
        account_id: { type: integer }
        brand_id: { type: integer, nullable: true }
        name: { type: string }
        filters:
          $ref: "#/components/schemas/SegmentFilters"
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    SegmentFilters:
      type: array
      items:
        type: object
        required: [name, predicate, value]
        properties:
          name:
            type: string
            description: |
              Filter name from flows.yml: contact_first_name, contact_last_name,
              contact_phone_number, contact_email, contact_country,
              contact_subscribed_phone, contact_subscribed_email,
              contact_created_at, contact_last_interacted_at,
              contact_source, contact_tag
          predicate:
            type: string
            description: |
              Ransack predicate: eq, not_eq, cont, not_cont, start, end,
              gt, lt, gteq, lteq, present, blank, true, false, in, not_in
          value:
            description: Filter value — string, number, boolean, or array for in/not_in

    # -- Campaign (CampaignSerializer) --
    Campaign:
      type: object
      properties:
        id: { type: integer }
        account_id: { type: integer }
        brand_id: { type: integer, nullable: true }
        status: { type: string, enum: [draft, active, paused, completed] }
        approval_state: { type: string }
        channel: { type: string, enum: [email, sms] }
        name: { type: string }
        data: { type: object, additionalProperties: true }
        scheduled_at: { type: string, format: date-time, nullable: true }
        sent_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        trigger:
          $ref: "#/components/schemas/FlowTrigger"
        template:
          oneOf:
            - $ref: "#/components/schemas/Template"
            - type: "null"
        templates:
          type: array
          items: { $ref: "#/components/schemas/Template" }

    # -- Message (MessageSerializer) --
    Message:
      type: object
      properties:
        id: { type: integer }
        channel: { type: string, enum: [email, sms] }
        to: { type: string }
        subject: { type: string, nullable: true }
        status: { type: string, enum: [queued, sent, failed] }
        provider_id: { type: string, nullable: true }
        flow_id: { type: integer, nullable: true, description: "Source flow ID (null for transactional)" }
        source_type: { type: string, nullable: true, enum: [campaign, flow], description: "campaign, flow, or null (transactional)" }
        source_name: { type: string, nullable: true, description: "Name of source campaign or flow" }
        sent_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    # -- Template (TemplateSerializer) --
    Template:
      type: object
      properties:
        id: { type: integer }
        name: { type: string, nullable: true }
        flow_id: { type: integer, nullable: true }
        action_id: { type: integer, nullable: true }
        subject: { type: string, nullable: true }
        body: { type: string, nullable: true }
        preheader: { type: string, nullable: true }
        from_name: { type: string, nullable: true }
        from_email: { type: string, nullable: true }
        reply_to: { type: string, nullable: true }
        design:
          oneOf:
            - $ref: "#/components/schemas/EmailDesign"
            - type: "null"
        variables: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # -- EmailStarter (config-based starter design) --
    EmailStarter:
      type: object
      properties:
        id: { type: string }
        category: { type: string }
        name: { type: string }
        description: { type: string }
        icon: { type: string }
        suggested_goals:
          type: array
          items: { type: string }
        design:
          $ref: "#/components/schemas/EmailDesign"
        preview_html: { type: string, nullable: true }

    # -- TemplateSummary (TemplateListSerializer — index only) --
    TemplateSummary:
      type: object
      properties:
        id: { type: integer }
        name: { type: string, nullable: true }
        subject: { type: string, nullable: true }
        preheader: { type: string, nullable: true }
        flow_id: { type: integer, nullable: true }
        section_count: { type: integer }
        section_types:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # -- Flow (FlowSerializer) --
    Flow:
      type: object
      properties:
        id: { type: integer }
        account_id: { type: integer }
        brand_id: { type: integer, nullable: true }
        status: { type: string, enum: [draft, active, paused, archived] }
        approval_state: { type: string }
        name: { type: string }
        goal: { type: string, nullable: true }
        trigger:
          $ref: "#/components/schemas/FlowTriggerOutput"
        steps:
          type: array
          items:
            $ref: "#/components/schemas/FlowStepOutput"
        sent_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        templates:
          type: array
          items: { $ref: "#/components/schemas/Template" }

    # -- FlowTrigger (campaign trigger — via Flow::TriggerSerializer) --
    FlowTrigger:
      type: object
      properties:
        id: { type: integer }
        flow_id: { type: integer }
        event: { type: string }
        segment_id: { type: integer, nullable: true }
        contact_list_id: { type: integer, nullable: true, deprecated: true, description: "Deprecated — use contact_list_ids" }
        contact_list_ids:
          type: array
          items: { type: integer }
          description: "Contact list IDs targeted by this trigger"
        data: { type: object, additionalProperties: true, nullable: true }
        triggered_count: { type: integer }
        last_triggered_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # -- Flow trigger/step input shapes (for create/update) --
    FlowTriggerInput:
      type: object
      properties:
        event:
          type: string
          description: |
            Built-in: contact_add, keyword, message, list_add, list_remove,
            product_view, checkout, cart_add, cart_remove, cart_abandoned,
            browse_abandoned. Custom: any lowercase alphanumeric with underscores.
        segment_id: { type: integer, nullable: true }
        contact_list_id: { type: integer, nullable: true, deprecated: true, description: "Deprecated — use contact_list_ids" }
        contact_list_ids:
          type: array
          items: { type: integer }
          description: "Contact list IDs to target"
        data: { type: object, additionalProperties: true }

    FlowTriggerOutput:
      description: Trigger as returned by Flow::Format.dump
      type: object
      properties:
        event: { type: string }
        segment_id: { type: integer, nullable: true }
        contact_list_id: { type: integer, nullable: true }
        data: { type: object, additionalProperties: true, nullable: true }

    FlowStepInput:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [email, sms, wait, split, emit_event]
        subject: { type: string, description: "Email step: subject line" }
        body: { type: string, description: "SMS body or email plain text" }
        preheader: { type: string, description: "Email step: preheader" }
        from_name: { type: string }
        from_email: { type: string }
        reply_to: { type: string }
        design:
          $ref: "#/components/schemas/EmailDesign"
        duration: { type: integer, description: "Wait step: seconds" }
        filters:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              predicate: { type: string }
              value: {}
          description: "Split step: condition filters"
        "yes":
          type: array
          items: { $ref: "#/components/schemas/FlowStepInput" }
          description: "Split step: yes branch"
        "no":
          type: array
          items: { $ref: "#/components/schemas/FlowStepInput" }
          description: "Split step: no branch"
        event_name: { type: string, description: "Emit event step: event to fire" }
        forward_event_data: { type: boolean, default: false }
        event_data: { type: object, additionalProperties: true }
        transactional: { type: boolean, default: false }

    FlowStepOutput:
      description: Step as returned by Flow::Format.dump
      type: object
      properties:
        type: { type: string, enum: [email, sms, wait, split, emit_event] }
        subject: { type: string }
        body: { type: string }
        preheader: { type: string }
        duration: { type: integer }
        filters: { type: array, items: { type: object } }
        "yes": { type: array, items: { $ref: "#/components/schemas/FlowStepOutput" } }
        "no": { type: array, items: { $ref: "#/components/schemas/FlowStepOutput" } }
        event_name: { type: string }
        forward_event_data: { type: boolean }

    # -- Event (default AMS) --
    Event:
      type: object
      properties:
        id: { type: integer }
        account_id: { type: integer }
        contact_id: { type: integer }
        user_id: { type: integer }
        event: { type: string }
        amount: { type: number, format: double, nullable: true }
        data: { type: object, additionalProperties: true }
        idempotency_key: { type: string, nullable: true }
        resource_uid: { type: string, nullable: true }
        resource_name: { type: string, nullable: true }
        resource_url: { type: string, nullable: true }
        test: { type: boolean }
        generated: { type: boolean }
        chain_depth: { type: integer }
        ip: { type: string, nullable: true }
        user_agent: { type: string, nullable: true }
        browser: { type: string, nullable: true }
        os: { type: string, nullable: true }
        device_type: { type: string, nullable: true }
        referrer: { type: string, nullable: true }
        utm_source: { type: string, nullable: true }
        utm_medium: { type: string, nullable: true }
        utm_term: { type: string, nullable: true }
        utm_content: { type: string, nullable: true }
        utm_campaign: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # -- Domain (DomainSerializer) --
    Domain:
      type: object
      properties:
        id: { type: integer }
        brand_id: { type: integer, nullable: true }
        name: { type: string }
        provider: { type: string, default: ses }
        status: { type: string, enum: [pending, verified, failed] }
        dns_records:
          type: array
          nullable: true
          items:
            type: object
            properties:
              record_type: { type: string }
              name: { type: string }
              value: { type: string }
              priority: { type: string, nullable: true }
              valid: { type: string }
        verified_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    # -- Integration (IntegrationSerializer) --
    Integration:
      type: object
      properties:
        id: { type: integer }
        provider: { type: string, enum: [mailgun, ses, postmark, resend, sendgrid, twilio] }
        category: { type: string, enum: [email, sms] }
        active: { type: boolean }
        primary: { type: boolean }
        status: { type: string, enum: [pending, connected, error] }
        connected_at: { type: string, format: date-time, nullable: true }
        last_tested_at: { type: string, format: date-time, nullable: true }
        error_message: { type: string, nullable: true }
        config_summary:
          type: object
          additionalProperties: true
        secret_hints:
          type: object
          additionalProperties:
            type: string
            nullable: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    IntegrationWriteRequest:
      type: object
      required: [integration]
      properties:
        integration:
          oneOf:
            - $ref: "#/components/schemas/MailgunIntegrationInput"
            - $ref: "#/components/schemas/SesIntegrationInput"
            - $ref: "#/components/schemas/PostmarkIntegrationInput"
            - $ref: "#/components/schemas/ResendIntegrationInput"
            - $ref: "#/components/schemas/SendgridIntegrationInput"

    MailgunIntegrationInput:
      type: object
      required: [provider, api_key, domain]
      properties:
        provider: { type: string, enum: [mailgun] }
        api_key: { type: string }
        domain: { type: string, description: Mailgun sending domain }
        region: { type: string, nullable: true, description: Optional Mailgun region hint }
        active: { type: boolean, default: true }

    SesIntegrationInput:
      type: object
      required: [provider, access_key_id, secret_access_key, region]
      properties:
        provider: { type: string, enum: [ses] }
        access_key_id: { type: string }
        secret_access_key: { type: string }
        region: { type: string, description: AWS SES region, e.g. us-east-1 }
        active: { type: boolean, default: true }

    PostmarkIntegrationInput:
      type: object
      required: [provider, server_token, account_token]
      properties:
        provider: { type: string, enum: [postmark] }
        server_token: { type: string, description: Postmark server token for sending email }
        account_token: { type: string, description: Postmark account token for domains API access }
        active: { type: boolean, default: true }

    ResendIntegrationInput:
      type: object
      required: [provider, api_key]
      properties:
        provider: { type: string, enum: [resend] }
        api_key: { type: string }
        active: { type: boolean, default: true }

    SendgridIntegrationInput:
      type: object
      required: [provider, api_key]
      properties:
        provider: { type: string, enum: [sendgrid] }
        api_key: { type: string }
        active: { type: boolean, default: true }

    # -- Plan (public) --
    Plan:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        active: { type: boolean }

    # -- Email Design --
    EmailDesign:
      type: object
      description: Email template design document
      properties:
        sections:
          type: array
          items:
            $ref: "#/components/schemas/EmailSection"
        theme:
          type: object
          description: Theme overrides merged on top of brand theme
          properties:
            brand_color: { type: string }
            bg_color: { type: string }
            text_color: { type: string }
            font_body: { type: string }
            font_heading: { type: string }
            logo_url: { type: string }

    EmailSection:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [header, hero, text, image, button, columns, product, social, divider, spacer, footer]
        props:
          type: object
          additionalProperties: true
          description: Section-specific properties (see email component spec)
        styles:
          type: object
          properties:
            background_color: { type: string }
            padding: { type: string }
            align: { type: string, enum: [left, center, right] }

    # -- Email Component Spec (from config/email_components.yml) --
    EmailComponentSpec:
      type: object
      description: |
        Full schema for email design sections. Each component has type,
        description, props (with types, required flags, defaults), and tips.
      properties:
        version: { type: integer }
        design_guidelines: { type: string }
        components:
          type: array
          items:
            type: object
            properties:
              type: { type: string }
              description: { type: string }
              tips: { type: array, items: { type: string } }
              props:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    type: { type: string }
                    required: { type: boolean }
                    default: {}
                    description: { type: string }
                    enum: { type: array, items: { type: string } }
        common_styles:
          type: object
        variables:
          type: array
          items: { type: string }
        theme_fields:
          type: array
          items: { type: string }

    # -- Flow Spec (from config/flows.yml) --
    FlowSpec:
      type: object
      description: |
        Schema for flow step types, trigger events, and segment filter names.
        Note: the raw response includes internal fields (icon, visible, inputs,
        outputs, alias) used by the flow editor UI — these can be ignored by
        API consumers.
      properties:
        filters:
          type: object
          additionalProperties:
            type: object
            properties:
              title: { type: string }
              summary: { type: string }
        triggers:
          type: array
          items:
            type: object
            properties:
              title: { type: string }
              event: { type: string }
        steps:
          type: array
          items:
            type: object
            properties:
              type: { type: string }
              title: { type: string }
              summary: { type: string }
              params:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    label: { type: string }
                    type: { type: string }
                    required: { type: boolean }
                    default: {}
                    description: { type: string }
